function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2600);
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}


// Жёлтый: тёмно-янтарный фон + коричневая цифра — хорошо отличается от красного
const R_COLORS=['red','blue','yellow','black'];
const R_TSTYLE={
  red:   {bg:'#fff',stroke:'#D63031',fill:'#D63031'},
  blue:  {bg:'#fff',stroke:'#0984E3',fill:'#0984E3'},
  yellow:{bg:'#FFF8DC',stroke:'#C07000',fill:'#7A4500'}, // янтарный фон + коричневая цифра
  black: {bg:'#1A2340',stroke:'#3A5070',fill:'#fff'},
};

function R_renderTile(tile,opts={}){
  const{invalid=false}=opts;
  const W=36,H=50,R=5;
  if(tile.joker){
    const uid='jg'+tile.id+'_'+((Math.random()*9999)|0);
    return`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
      <defs><linearGradient id="${uid}" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#D63031"/><stop offset="33%" stop-color="#E6900A"/>
        <stop offset="66%" stop-color="#0984E3"/><stop offset="100%" stop-color="#6C3483"/>
      </linearGradient></defs>
      <rect width="${W}" height="${H}" rx="${R}" fill="url(#${uid})" stroke="${invalid?'#e74c3c':'rgba(255,255,255,.25)'}" stroke-width="${invalid?2.5:1.5}"/>
      <text x="${W/2}" y="${H/2+5}" text-anchor="middle" font-family="Arial" font-size="16" font-weight="900" fill="#fff" paint-order="stroke" stroke="#0005" stroke-width="2">★</text>
      <text x="${W/2}" y="${H-5}" text-anchor="middle" font-family="Arial" font-size="7" fill="rgba(255,255,255,.7)">JOKER</text>
    </svg>`;
  }
  const s=R_TSTYLE[tile.color],n=tile.number,fs=15;
  const isBlack=tile.color==='black';
  const numA=isBlack
    ?`fill="#fff" paint-order="stroke" stroke="#1A2340" stroke-width="2.5" stroke-linejoin="round"`
    :`fill="${s.fill}"`;
  const corA=isBlack?`fill="#fff" opacity=".8"`:`fill="${s.fill}" opacity=".55"`;
  return`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    <rect width="${W}" height="${H}" rx="${R}" fill="${s.bg}" stroke="${invalid?'#e74c3c':s.stroke}" stroke-width="${invalid?2.5:2.5}"/>
    <text x="${W/2}" y="${H/2+6}" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-size="${fs}" font-weight="900" ${numA}>${n}</text>
    <text x="3" y="${H-4}" font-family="Arial" font-size="6" font-weight="700" ${corA}>${n}</text>
    <text x="${W-3}" y="9" text-anchor="end" font-family="Arial" font-size="6" font-weight="700" ${corA}>${n}</text>
  </svg>`;
}

function R_shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}
function R_createDeck(){
  let id=0,t=[];
  for(let s=0;s<2;s++) for(const c of R_COLORS) for(let n=1;n<=13;n++) t.push({id:id++,color:c,number:n,joker:false});
  t.push({id:id++,joker:true},{id:id++,joker:true});
  return R_shuffle(t);
}
function R_validateCombo(tiles){
  if(tiles.length<3)return false;
  const nj=tiles.filter(t=>!t.joker),jc=tiles.length-nj.length;
  if(!nj.length)return false;

  // Проверка группы: одинаковые числа разных цветов
  const num=nj[0].number;
  if(nj.every(t=>t.number===num)){
    const colors=nj.map(t=>t.color);
    return new Set(colors).size===colors.length && tiles.length<=4;
  }

  // Проверка серии: одного цвета, подряд (с джокерами как заменителями)
  const col=nj[0].color;
  if(!nj.every(t=>t.color===col))return false;
  const nums=nj.map(t=>t.number).sort((a,b)=>a-b);
  if(new Set(nums).size!==nums.length)return false; // дубли не допустимы
  const min=nums[0], max=nums[nums.length-1];
  const span=max-min+1;
  // Джокеры заполняют пробелы: пробелов должно быть <= кол-ву джокеров
  const gaps=span-nj.length;
  if(gaps<0||gaps>jc)return false;
  // Общая длина не превышает максимальную серию
  if(tiles.length>13)return false;
  // Можно добавить джокеры по краям тоже (для серий типа J,2,3 или 11,12,J)
  const extraJokers=jc-gaps; // джокеры не в пробелах — они на краях
  return (min-extraJokers)>=1 || (max+extraJokers)<=13 || extraJokers===0;
}
const R_tv=t=>t.joker?30:t.number;
const R_BOT='🤖 Бот';

function R_initGame(names,withBot){
  const bag=R_createDeck();
  const allNames=withBot?(names.length<2?[...names,R_BOT]:names):names;
  const ids=[...allNames];
  const hands={};
  for(const id of ids) hands[id]=bag.splice(0,14);
  return{phase:'playing',bag,hands,table:[],playerOrder:ids,names:Object.fromEntries(ids.map(id=>[id,id])),
    melded:{},scores:Object.fromEntries(ids.map(id=>[id,0])),winner:null,current:ids[0],_seq:0,withBot};
}

function R_sysMsg(txt){
  if(S._state){S._state.chat=S._state.chat||[];S._state.chat.push({type:'system',text:txt,ts:Date.now()});}
}

const R_timing={turnStart:0,totals:{},turns:{},interval:null};
function R_timingInit(order){for(const p of order){R_timing.totals[p]=0;R_timing.turns[p]=0;}}
function R_timingStartTurn(){
  R_timing.turnStart=Date.now();
  if(R_timing.interval)clearInterval(R_timing.interval);
  R_timing.interval=setInterval(()=>{R_renderTimerChip();R_renderTimingPanel();},1000);
}
function R_timingEndTurn(pid){
  const ms=Date.now()-R_timing.turnStart;
  R_timing.totals[pid]=(R_timing.totals[pid]||0)+ms;
  R_timing.turns[pid]=(R_timing.turns[pid]||0)+1;
  if(R_timing.interval){clearInterval(R_timing.interval);R_timing.interval=null;}
  // Сохранить в R_G чтобы следующий gPatch отправил другим игрокам
  if(R_G){
    R_G.timing=R_G.timing||{};
    R_G.timing.totals=Object.assign({},R_timing.totals);
    R_G.timing.turns=Object.assign({},R_timing.turns);
  }
}
function R_fmtMs(ms){const s=Math.floor(ms/1000),m=Math.floor(s/60);return m>0?`${m}м ${s%60}с`:`${s}с`;}
function R_fmtCur(){const s=Math.floor((Date.now()-R_timing.turnStart)/1000),m=Math.floor(s/60);return m>0?`${m}:${String(s%60).padStart(2,'0')}`:`${s}с`;}
function R_renderTimerChip(){
  const el=document.getElementById('R-timer-chip');if(!el)return;
  const s=Math.floor((Date.now()-R_timing.turnStart)/1000);
  el.className='timer-chip'+(s>=60?' warn':s>=30?' running':'');
  el.textContent='⏱ '+R_fmtCur();
}
function R_renderTimingPanel(){
  const el=document.getElementById('R-timing-rows');if(!el||!R_G)return;
  el.innerHTML=R_G.playerOrder.map(pid=>{
    const act=pid===R_G.current,tot=R_fmtMs(R_timing.totals[pid]||0),turns=R_timing.turns[pid]||0;
    const avg=turns>0?R_fmtMs((R_timing.totals[pid]||0)/turns):'—';
    return`<div class="tp-row${act?' tp-active':''}">
      <span class="tp-name">${pid==='🤖 Бот'?'🤖 Бот':pid}</span>
      <div class="tp-times">
        ${act?`<span class="tp-cur">⏱ ${R_fmtCur()}</span>`:''}
        <span class="tp-stat">Итого: ${tot}</span>
        <span class="tp-stat">Ходов: ${turns}·avg:${avg}</span>
      </div></div>`;
  }).join('');
}

let R_G=null,R_viewAs=null;
const R_ui={wTable:[],wHand:[],inv:new Set(),dragging:null};

function R_startGame(withBot=false){
  const state=S._state; if(!state){alert('Нет соединения');return;}
  let names=(state.players||[]).map(p=>p.name).filter(n=>n&&n!==R_BOT);
  if(names.length<2){alert('Нужно минимум 2 игрока');return;}
  R_G=R_initGame(names,withBot); R_viewAs=S.name;
  R_timingInit(R_G.playerOrder);
  state.games=state.games||{}; state.games.rummikub=R_G;
  state.chat=state.chat||[];
  state.chat.push({type:'system',text:'Румикуб начался! Ход: '+R_G.playerOrder[0],ts:Date.now()});
  gPatch(state);
  R_initTurn(); R_render(); R_timingStartTurn();
}


function R_initTurn(){
  R_ui.wTable=JSON.parse(JSON.stringify(R_G.table));
  R_ui.wHand=JSON.parse(JSON.stringify(R_G.hands[R_G.current]||[]));
  R_ui.inv=new Set();
}

function R_render(){
  if(!document.getElementById('R-table-wrapper')){
    const gc=document.getElementById('game-content');
    if(!gc)return;
    gc.classList.remove('centered');
    gc.innerHTML=R_GAME_HTML;
  }
  R_renderHdr();R_renderTable();R_renderHand();R_renderActions();R_renderScore();R_renderTimingPanel();
}

function R_renderHdr(){
  const tabsEl=document.getElementById('R-player-tabs');
  const statEl=document.getElementById('R-status-row');
  if(!tabsEl||!statEl||!R_G)return;
  const g=R_G,isMy=S.name===R_G.current&&S.name!==R_BOT;
  tabsEl.innerHTML=g.playerOrder.filter(pid=>pid!==R_BOT).map(pid=>{
    const act=pid===R_viewAs,isTurn=pid===R_G.current;
    return`<div class="tab${act?' active':''}${isTurn?' turn':''}" onclick="R_switchView('${pid}')"
      title="${isTurn?'Сейчас ходит':'Посмотреть руку'}">
      ${isTurn?'<span class="tab-dot"></span>':''}${pid}
    </div>`;
  }).join('');

  let chip='';
  if(g.phase==='finished'){
    chip=`<div class="who-chip done">🏆 ${g.winner==='🤖 Бот'?'Бот победил!':g.winner+' победил!'}</div>`;
  } else if(R_G.current===R_BOT){
    chip=`<div class="who-chip wait">🤖 Бот думает...</div>`;
  } else if(isMy){
    chip=`<div class="who-chip my"><span class="dot-live"></span> Ваш ход, ${R_viewAs}</div>`;
  } else {
    chip=`<div class="who-chip wait">👁 Смотрите ход: ${R_G.current}</div>`;
  }

  const pills=g.playerOrder.map(pid=>{
    const act=pid===R_G.current;
    const hand=g.hands[pid]||[];
    const penalty=hand.reduce((s,t)=>s+R_tv(t),0);
    return`<div class="ppill${act?' active':''}">
      <span class="pname">${pid}</span>
      <span class="phand">✋${hand.length}</span>
      ${g.melded[pid]?'<span class="pmelded">✓</span>':''}
      ${penalty>0?`<span class="pscore">${penalty}🃏</span>`:''}
    </div>`;
  }).join('');

  statEl.innerHTML=
    chip+
    `<div class="timer-chip" id="R-timer-chip">⏱ 0с</div>`+
    `<div class="player-pills">${pills}</div>`+
    `<div class="bag-info">🎒 ${g.bag.length}</div>`;
}

function R_renderTable(){
  const isMy=S.name===R_G.current&&S.name!==R_BOT&&R_G.phase==='playing';
  const tbl=isMy?R_ui.wTable:R_G.table;
  const el=document.getElementById('rmb-table');
  if(!el)return;
  if(!tbl||!tbl.length){
    el.innerHTML='<div class="tbl-empty">Стол пуст — перетащите фишки сюда</div>'+(isMy?'<div class="new-grp-zone" data-newgrp="1">+ новая группа</div>':'');
    if(isMy)R_bindZone(el.querySelector('.new-grp-zone'));
    return;
  }
  el.innerHTML=tbl.map((grp,gi)=>{
    const inv=R_ui.inv.has(gi);
    let inner='';
    grp.forEach((tile,ti)=>{
      inner+=`<div class="ins" data-gi="${gi}" data-pos="${ti}"></div>`;
      inner+=`<div class="rmb-tile${isMy?' drag':''}" data-src="table" data-gi="${gi}" data-ti="${ti}" data-id="${tile.id}">${R_renderTile(tile,{invalid:inv})}</div>`;
    });
    inner+=`<div class="ins" data-gi="${gi}" data-pos="${grp.length}"></div>`;
    return`<div class="rmb-group${inv?' invalid':''}" data-gi="${gi}" data-grp="1">${inner}</div>`;
  }).join('')+(isMy?'<div class="new-grp-zone" data-newgrp="1">+ новая группа</div>':'');
  if(isMy){
    el.querySelectorAll('.rmb-tile.drag').forEach(e=>e.addEventListener('pointerdown',R_startDrag));
    R_bindZone(el.querySelector('.new-grp-zone'));
  }
}

function R_bindZone(el){if(!el)return;el.addEventListener('pointerenter',()=>el.classList.add('dh'));el.addEventListener('pointerleave',()=>el.classList.remove('dh'));}

function R_renderHand(){
  const isMy=S.name===R_G.current&&S.name!==R_BOT&&R_G.phase==='playing';
  const isBot=R_viewAs===R_BOT;
  const hand=isMy?R_ui.wHand:(R_G.hands[S.name]||[]);
  document.getElementById('R-hand-lbl').textContent=
    isBot?`Рука бота (скрыта)`
    :isMy?`Ваши фишки (${hand.length}) — перетащите на стол`
    :`Фишки: ${R_viewAs} (${hand.length})`;
  const el=document.getElementById('rmb-hand');
  if(!el)return;
  if(isBot){el.innerHTML='<div class="hand-empty">🤖 рука бота скрыта</div>';return;}
  if(!hand.length){el.innerHTML='<div class="hand-empty">Нет фишек</div>';return;}
  const sorted=[...hand].sort((a,b)=>{if(a.joker)return 1;if(b.joker)return-1;const co={red:0,blue:1,yellow:2,black:3};return co[a.color]-co[b.color]||a.number-b.number;});
  el.innerHTML=sorted.map(t=>`<div class="rmb-tile${isMy?' drag':''}" data-src="hand" data-id="${t.id}">${R_renderTile(t)}</div>`).join('');
  if(isMy){
    el.querySelectorAll('.drag').forEach(e=>{
      e.addEventListener('pointerdown',R_startDrag);
      // Правый клик — вернуть фишку со стола в руку
      e.addEventListener('contextmenu',(ev)=>{
        ev.preventDefault();
        const src=e.dataset.src;
        if(src!=='table')return;
        const gi=+e.dataset.gi,ti=+e.dataset.ti;
        const tile=R_ui.wTable[gi]?.[ti];
        if(!tile)return;
        R_ui.wTable[gi].splice(ti,1);
        R_ui.wTable=R_ui.wTable.filter(g=>g.length>0);
        R_ui.wHand.push(tile);
        R_revalidate();
        R_renderTable();R_renderHand();
      });
    });
  }
}

function R_renderActions(){
  const bar=document.getElementById('R-action-bar');
  if(!bar)return;
  const isMy=S.name===R_G.current&&S.name!==R_BOT&&R_G.phase==='playing';
  if(!isMy){bar.style.display='none';return;}
  bar.style.display='flex';
  bar.innerHTML=`
    <button class="rmb-btn btn-ok" id="btn-ok">✓ Подтвердить</button>
    <button class="rmb-btn btn-undo" id="btn-undo">↩ Отменить</button>
    <button class="rmb-btn btn-draw" id="btn-draw">+1 из мешка (${R_G.bag.length})</button>`;
  document.getElementById('btn-ok').onclick=R_confirmTurn;
  document.getElementById('btn-undo').onclick=R_cancelTurn;
  document.getElementById('btn-draw').onclick=R_drawTile;
}

function R_renderScore(){
  const el=document.getElementById('R-score-inner');if(!el||!R_G)return;
  el.innerHTML=R_G.playerOrder.filter(pid=>pid!==R_BOT).map((pid,i)=>{
    const hand=R_G.hands[pid]||[];
    const penalty=hand.reduce((s,t)=>s+R_tv(t),0);
    return(i>0?'<div class="score-sep"></div>':'')+
      `<div class="score-item"><span class="si-name">${pid}</span><span class="si-hand">🃏${penalty}pts</span><span class="si-total">Штраф:${R_G.scores[pid]||0}</span></div>`;
  }).join('');
}

let R_ghost=null;

function R_startDrag(e){
  if(e.button&&e.button!==0)return;
  e.preventDefault();
  const el=e.currentTarget;
  const src=el.dataset.src,id=parseInt(el.dataset.id);
  let tile;
  if(src==='hand') tile=R_ui.wHand.find(t=>t.id===id);
  else tile=R_ui.wTable[+el.dataset.gi]?.[+el.dataset.ti];
  if(!tile)return;
  R_ui.dragging={tile,src,gi:+el.dataset.gi,ti:+el.dataset.ti,id};
  R_ghost=document.createElement('div');
  R_ghost.className='rmb-ghost';
  R_ghost.innerHTML=R_renderTile(tile);
  document.body.appendChild(R_ghost);
  R_placeGhost(e);
  // Показать и подготовить все ins-слоты
  document.querySelectorAll('#rmb-table .ins').forEach(s=>s.style.width='18px');
  document.addEventListener('pointermove',R_onMove);
  document.addEventListener('pointerup',R_onDrop);
  el.setPointerCapture(e.pointerId);
}

function R_placeGhost(e){
  if(!R_ghost)return;
  R_ghost.style.left=(e.clientX-18)+'px';
  R_ghost.style.top=(e.clientY-25)+'px';
  // Подсветить ближайший слот
  const slots=[...document.querySelectorAll('#rmb-table .ins')];
  let best=null,bestD=Infinity;
  slots.forEach(s=>{
    const r=s.getBoundingClientRect();
    const d=Math.hypot(e.clientX-(r.left+r.width/2),e.clientY-(r.top+r.height/2));
    if(d<bestD){bestD=d;best=s;}
  });
  slots.forEach(s=>s.classList.remove('dh'));
  if(best&&bestD<90) best.classList.add('dh');
}
function R_onMove(e){R_placeGhost(e);}

function R_onDrop(e){
  document.removeEventListener('pointermove',R_onMove);
  document.removeEventListener('pointerup',R_onDrop);
  if(R_ghost){R_ghost.remove();R_ghost=null;}
  document.querySelectorAll('#rmb-table .ins').forEach(s=>{s.style.width='';s.classList.remove('dh');});
  if(!R_ui.dragging)return;
  const cx=e.clientX,cy=e.clientY;
  // Ближайший ins-слот
  const slots=[...document.querySelectorAll('#rmb-table .ins')];
  let bestSlot=null,bestD=Infinity;
  slots.forEach(s=>{
    const r=s.getBoundingClientRect();
    const d=Math.hypot(cx-(r.left+r.width/2),cy-(r.top+r.height/2));
    if(d<bestD){bestD=d;bestSlot=s;}
  });
  const newGrpEl=document.querySelector('#rmb-table .new-grp-zone');
  const newGrpR=newGrpEl?.getBoundingClientRect();
  const inNewGrp=newGrpR&&cx>=newGrpR.left&&cx<=newGrpR.right&&cy>=newGrpR.top&&cy<=newGrpR.bottom;
  const handR=document.getElementById('rmb-hand')?.getBoundingClientRect();
  const inHand=handR&&cx>=handR.left&&cx<=handR.right&&cy>=handR.top&&cy<=handR.bottom;
  if(inHand&&R_ui.dragging.src==='table'){
    R_pullFromSrc();R_ui.wHand.push(R_ui.dragging.tile);
  } else if(inNewGrp){
    R_pullFromSrc();R_ui.wTable.push([R_ui.dragging.tile]);
  } else if(bestSlot&&bestD<90){
    const gi=+bestSlot.dataset.gi,pos=+bestSlot.dataset.pos;
    R_pullFromSrc();
    if(!R_ui.wTable[gi])R_ui.wTable[gi]=[];
    R_ui.wTable[gi].splice(pos,0,R_ui.dragging.tile);
    R_ui.wTable=R_ui.wTable.filter(g=>g.length>0);
  }
  R_ui.dragging=null;
  R_revalidate();
  R_renderTable();R_renderHand();
}

function R_pullFromSrc(){
  const{src,gi,id}=R_ui.dragging;
  if(src==='hand'){R_ui.wHand=R_ui.wHand.filter(t=>t.id!==id);}
  else{if(R_ui.wTable[gi])R_ui.wTable[gi]=R_ui.wTable[gi].filter(t=>t.id!==id);R_ui.wTable=R_ui.wTable.filter(g=>g.length>0);}
}

function R_revalidate(){
  R_ui.inv=new Set();
  R_ui.wTable.forEach((g,i)=>{if(!R_validateCombo(g))R_ui.inv.add(i);});
}

async function R_confirmTurn(){
  if(S._acting)return;
  if(R_ui.inv.size>0){R_notice('Исправьте красные комбинации');return;}
  const pid=R_G.current;
  const origHandIds=new Set((R_G.hands[pid]||[]).map(t=>t.id));
  const origTblIds=new Set(R_G.table.flat().map(t=>t.id));
  // Фишки на рабочем столе которые пришли из руки (не были на столе изначально)
  const laidDown=R_ui.wTable.flat().filter(t=>origHandIds.has(t.id));
  if(!laidDown.length){R_notice('Выложите хотя бы одну фишку из руки');return;}
  if(!R_G.melded[pid]){
    // Первый выход: только своими фишками, без трогания чужих
    const foreign=R_ui.wTable.flat().filter(t=>!origHandIds.has(t.id)&&!origTblIds.has(t.id));
    if(foreign.length){R_notice('Первый выход — только своими фишками!');return;}
    const sc=laidDown.reduce((s,t)=>s+R_tv(t),0);
    if(sc<30){R_notice(`Первый выход: нужно ≥30 своих очков (сейчас ${sc})`);return;}
    R_G.melded[pid]=true;
  }
  R_timingEndTurn(pid);
  R_G.table=JSON.parse(JSON.stringify(R_ui.wTable));
  R_G.hands[pid]=JSON.parse(JSON.stringify(R_ui.wHand));
  const st=S._state;
  if(st){st.chat=st.chat||[];st.chat.push({type:'system',text:`${pid} сделал ход (${laidDown.length} фишек)`,ts:Date.now()});}
  if(!R_G.hands[pid].length){
    R_G.phase='finished';R_G.winner=pid;
    for(const p of R_G.playerOrder)if(p!==pid)R_G.scores[p]=(R_G.scores[p]||0)+R_G.hands[p].reduce((s,t)=>s+R_tv(t),0);
    if(st){st.games=st.games||{};st.games.rummikub=R_G;await gPatch(st);}
    R_render();return;
  }
  R_nextPlayer();
}

function R_cancelTurn(){R_initTurn();R_renderTable();R_renderHand();}

async function R_drawTile(){
  if(S._acting)return;
  if(!R_G||R_G.phase!=='playing')return;
  if(S.name!==R_G.current){R_notice('Не ваш ход');return;}
  S._acting=true;
  const _t=setTimeout(()=>{S._acting=false;},5000);
  try{
    if(!R_G.bag.length){R_notice('Мешок пуст!');return;}
    const pid=R_G.current;
    R_timingEndTurn(pid);
    const tile=R_G.bag.splice(0,1)[0];
    R_G.hands[pid].push(tile);
    if(pid===S.name) R_ui.wHand.push(tile);
    R_sysMsg(`${pid} взял фишку из мешка`);
    const idx=R_G.playerOrder.indexOf(pid);
    R_G.current=R_G.playerOrder[(idx+1)%R_G.playerOrder.length];
    R_G._seq=(R_G._seq||0)+1;
    R_viewAs=S.name;
    const st=S._state;
    if(st){st.games=st.games||{};st.games.rummikub=R_G;await gPatch(st);}
    R_initTurn(); R_render(); R_timingStartTurn();
  }finally{clearTimeout(_t);S._acting=false;}
}

async function R_nextPlayer(){
  const idx=R_G.playerOrder.indexOf(R_G.current);
  R_G.current=R_G.playerOrder[(idx+1)%R_G.playerOrder.length];
  R_G._seq=(R_G._seq||0)+1;
  R_viewAs=R_G.current===R_BOT?(R_G.playerOrder.find(p=>p!==R_BOT)||R_G.playerOrder[0]):S.name;
  const st=S._state; if(st){st.games=st.games||{};st.games.rummikub=R_G;await gPatch(st);}
  R_initTurn(); R_render(); R_timingStartTurn();
  const tw=document.getElementById('R-table-wrapper'); if(tw)tw.scrollTop=0;
}


function R_switchView(pid){if(pid!==R_BOT){R_viewAs=pid;R_render();}}

function R_notice(msg){toast(msg);}

// Простой бот: ищет серии и группы, выкладывает первую найденную
function R_botMove(){
  if(!R_G||R_G.current!==R_BOT||R_G.phase!=='playing')return;
  const hand=[...(R_G.hands[R_BOT]||[])];
  let moved=false;
  let newGroup=null;

  // Ищем серию (3+ одного цвета подряд)
  const byColor={};
  hand.filter(t=>!t.joker).forEach(t=>{if(!byColor[t.color])byColor[t.color]=[];byColor[t.color].push(t);});
  for(const [col,tiles] of Object.entries(byColor)){
    const sorted=[...tiles].sort((a,b)=>a.number-b.number);
    let run=[sorted[0]];
    for(let i=1;i<sorted.length;i++){
      if(sorted[i].number===run[run.length-1].number+1) run.push(sorted[i]);
      else{if(run.length>=3)break;run=[sorted[i]];}
    }
    if(run.length>=3){
      const sc=run.slice(0,3).reduce((s,t)=>s+t.number,0);
      const useRun=run.slice(0,Math.min(run.length,6));
      const runSc=useRun.reduce((s,t)=>s+t.number,0);
      if(!R_G.melded[R_BOT]&&runSc<30) continue;
      newGroup=useRun;moved=true;break;
    }
  }

  // Ищем группу (3 одинаковых числа разных цветов)
  if(!moved){
    const byNum={};
    hand.filter(t=>!t.joker).forEach(t=>{if(!byNum[t.number])byNum[t.number]=[];byNum[t.number].push(t);});
    for(const [num,tiles] of Object.entries(byNum)){
      const uniq=[];const usedC=new Set();
      for(const t of tiles){if(!usedC.has(t.color)){uniq.push(t);usedC.add(t.color);}}
      if(uniq.length>=3){
        const grp=uniq.slice(0,3);
        const sc=grp.reduce((s,t)=>s+t.number,0);
        if(!R_G.melded[R_BOT]&&sc<30) continue;
        newGroup=grp;moved=true;break;
      }
    }
  }

  if(moved&&newGroup){
    if(!R_G.melded[R_BOT]) R_G.melded[R_BOT]=true;
    newGroup.forEach(t=>{
      const idx=R_G.hands[R_BOT].findIndex(x=>x.id===t.id);
      if(idx!==-1) R_G.hands[R_BOT].splice(idx,1);
    });
    R_G.table.push(newGroup);
    R_sysMsg(`🤖 Бот выложил комбинацию (${newGroup.map(t=>t.number).join(',')})`);
    if(!R_G.hands[R_BOT].length){
      R_G.phase='finished';R_G.winner=R_BOT;
      for(const p of R_G.playerOrder)if(p!==R_BOT)R_G.scores[p]=(R_G.scores[p]||0)+R_G.hands[p].reduce((s,t)=>s+R_tv(t),0);
      R_sysMsg('🏆 Бот победил!');
      R_timingEndTurn(R_BOT);R_render();return;
    }
  } else {
    if(R_G.bag.length){R_G.hands[R_BOT].push(R_G.bag.splice(0,1)[0]);R_sysMsg('🤖 Бот взял фишку из мешка');}
    else R_sysMsg('🤖 Бот пропустил ход (мешок пуст)');
  }

  R_timingEndTurn(R_BOT);
  const idx=R_G.playerOrder.indexOf(R_BOT);
  R_G.current=R_G.playerOrder[(idx+1)%R_G.playerOrder.length];
  R_G._seq++;R_viewAs=R_G.current;
  R_initTurn();R_render();R_timingStartTurn();
  R_sysMsg(`Ход: ${R_G.current}`);
  document.getElementById('R-table-wrapper').scrollTop=0;
}

function renderRummikub(state){
  const gc=document.getElementById('game-content');
  if(!gc)return;
  gc.classList.remove('centered');

  const rmb=state&&state.games&&state.games.rummikub;

  // Нет игры — показать лобби
  if(!rmb||!rmb.phase||rmb.phase==='idle'){
    const players=(state&&state.players)||[];
    gc.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100%;">
      <div style="text-align:center;padding:20px;">
        <div style="font-size:48px;margin-bottom:12px">🎲</div>
        <h2 style="margin-bottom:8px">Румикуб</h2>
        <p style="color:#888;font-size:13px;margin-bottom:6px">Игроки: ${players.map(p=>p.name).join(', ')||'нет'}</p>
        <p style="color:#aaa;font-size:12px;margin-bottom:20px">Перетащи фишки на стол и выложи комбинации</p>
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
          <button onclick="R_startGame(false)" style="padding:11px 22px;background:#0984E3;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;">▶ Начать игру</button>
        </div>
      </div>
    </div>`;
    return;
  }

  // Синхронизировать если seq изменился (ход сделан другим игроком)
  if(!R_G||(rmb._seq||0)>(R_G._seq||0)){
    R_G=JSON.parse(JSON.stringify(rmb));
    R_viewAs=S.name;
    if(!Object.keys(R_timing.totals||{}).length) R_timingInit(R_G.playerOrder);
    // Восстановить статистику из state (синхронизация между игроками)
    if(R_G.timing){
      if(R_G.timing.totals) Object.assign(R_timing.totals, R_G.timing.totals);
      if(R_G.timing.turns)  Object.assign(R_timing.turns,  R_G.timing.turns);
    }
    R_initTurn();
    R_timingStartTurn();

  }

  // Монтировать HTML скелет только один раз
  if(!document.getElementById('R-table-wrapper')){
    gc.innerHTML=R_GAME_HTML;
  }

  // Рендерить содержимое
  R_render();
}
